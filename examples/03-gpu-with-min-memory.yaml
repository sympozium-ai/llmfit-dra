# Request a GPU that also clears a memory floor — the kind class AND a CEL.
#
# The DeviceClass guarantees "a healthy, non-vendor-managed GPU"; the
# claim-level CEL selector ANDs on extra physics. Everything the driver
# publishes is addressable:
#
#   device.capacity['llmfit.ai'].memory                     (Quantity, bytes)
#   device.attributes['llmfit.ai'].memoryBandwidthGBs       (int, GB/s)
#   device.attributes['llmfit.ai'].unifiedMemory            (bool)
#   device.attributes['llmfit.ai'].backend                  (ROCm / Vulkan / SYCL / CUDA / Metal)
#   device.attributes['llmfit.ai'].model                    (string)
#   device.attributes['llmfit.ai'].healthy                  (bool)
#
# On a unified-memory APU the GPU's `memory` capacity IS the shared system
# RAM pool — which is exactly why an integrated GPU can satisfy large-memory
# claims a small discrete card could not.
#
#   kubectl apply -f 03-gpu-with-min-memory.yaml
#   kubectl wait --for=condition=Ready pod/llmfit-gpu-16g-demo --timeout=120s
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: gpu-16g-claim
spec:
  devices:
    requests:
      - name: dev
        exactly:
          deviceClassName: gpu.llmfit.ai
          selectors:
            - cel:
                expression: >-
                  device.capacity['llmfit.ai'].memory.compareTo(quantity('16Gi')) >= 0 &&
                  device.attributes['llmfit.ai'].healthy
---
apiVersion: v1
kind: Pod
metadata:
  name: llmfit-gpu-16g-demo
spec:
  restartPolicy: Never
  containers:
    - name: main
      image: docker.io/library/busybox:1.36
      command: ["sh", "-c", "echo '--- llmfit env ---'; env | grep LLMFIT_ || echo '(none)'; sleep 3600"]
      resources:
        claims:
          - name: dev
  resourceClaims:
    - name: dev
      resourceClaimName: gpu-16g-claim
