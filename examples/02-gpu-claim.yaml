# Request a GPU device — the simplest accelerator claim.
#
# The `gpu.llmfit.ai` DeviceClass matches any healthy llmfit GPU that isn't
# vendor-managed. On an integrated-GPU box (e.g. AMD Strix Halo / Framework
# Desktop) this is the on-die Radeon, whose memory is the shared unified
# pool. A gpu claim prepares env + the /dev render node.
#
#   kubectl apply -f 02-gpu-claim.yaml
#   kubectl wait --for=condition=Ready pod/llmfit-gpu-demo --timeout=120s
#   kubectl logs llmfit-gpu-demo        # LLMFIT_DEVICE=gpu0
#   kubectl delete -f 02-gpu-claim.yaml
#
# No GPU on the node? The pod stays Pending ("cannot allocate all claims") —
# that's the honest answer. Check your inventory with:
#   kubectl get resourceslices -o yaml | grep -A2 'name: gpu'
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: gpu-claim
spec:
  devices:
    requests:
      - name: dev
        exactly:
          deviceClassName: gpu.llmfit.ai
---
apiVersion: v1
kind: Pod
metadata:
  name: llmfit-gpu-demo
spec:
  restartPolicy: Never
  containers:
    - name: main
      image: docker.io/library/busybox:1.36
      command: ["sh", "-c", "echo '--- llmfit env ---'; env | grep LLMFIT_ || echo '(none)'; sleep 3600"]
      resources:
        claims:
          - name: dev
  resourceClaims:
    - name: dev
      resourceClaimName: gpu-claim
