name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # A RELEASE_TOKEN PAT lets CI run on the release PR (GITHUB_TOKEN
          # -created PRs do not trigger workflows). Falls back to the
          # default token when the secret is absent.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
