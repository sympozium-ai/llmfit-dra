# The heavy multi-node e2e: a 3-node kind cluster proving cross-node claim
# scheduling and per-node slice/prepare behavior. Deliberately NOT on every
# push (too heavy) — nightly, on release tags, and on demand.
name: e2e-multinode

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  e2e-multinode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE }}:e2e
          cache-from: type=gha
      - name: Create 3-node kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.35.0
          cluster_name: e2e
          config: hack/kind-multinode.yaml
      - name: Load image
        run: kind load docker-image ${{ env.IMAGE }}:e2e --name e2e
      - name: Deploy via the Helm chart
        run: |
          helm install llmfit-dra charts/llmfit-dra -n llmfit-dra --create-namespace \
            --set image.repository=${{ env.IMAGE }} \
            --set image.tag=e2e \
            --set image.pullPolicy=IfNotPresent \
            --set imagePullSecrets=null
          kubectl -n llmfit-dra rollout status daemonset/llmfit-dra --timeout=180s
      - name: Scenarios
        run: ./hack/scenarios.sh
      - name: Debug on failure
        if: failure()
        run: |
          kubectl -n llmfit-dra get pods -o wide || true
          kubectl -n llmfit-dra logs daemonset/llmfit-dra --tail=100 || true
          kubectl get resourceslices -o yaml || true
