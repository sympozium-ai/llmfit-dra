name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**.md", "docs/**"]
  pull_request:
    paths-ignore: ["**.md", "docs/**"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Unit tests (race detector on)
        run: go test -race ./...
      - name: Helm lint
        run: helm lint charts/llmfit-dra

  # Full DRA path on a GPU-less kind cluster: publish → CEL allocation →
  # kubelet plugin prepare (CDI) → pod Running, via the cpu0 fallback device.
  # SINGLE node to keep per-push CI light — the 3-node multi-node suite runs
  # nightly / on dispatch / on release tags (e2e-multinode.yml).
  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE }}:e2e
          cache-from: type=gha
      - name: Create kind cluster (K8s ≥ 1.34 for DRA GA)
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.35.0
          cluster_name: e2e
      - name: Load image
        run: kind load docker-image ${{ env.IMAGE }}:e2e --name e2e
      - name: Deploy (via the Helm chart — keeps the chart continuously tested)
        run: |
          helm install llmfit-dra charts/llmfit-dra -n llmfit-dra --create-namespace \
            --set image.repository=${{ env.IMAGE }} \
            --set image.tag=e2e \
            --set image.pullPolicy=IfNotPresent \
            --set imagePullSecrets=null
          kubectl -n llmfit-dra rollout status daemonset/llmfit-dra --timeout=180s
      - name: Scenarios
        run: ./hack/scenarios.sh
      - name: Debug on failure
        if: failure()
        run: |
          kubectl -n llmfit-dra get pods -o wide || true
          kubectl -n llmfit-dra logs daemonset/llmfit-dra --tail=100 || true
          kubectl get resourceslices -o yaml || true
          kubectl describe pod llmfit-consumer llmfit-cpu-consumer 2>/dev/null || true

  # Push the Helm chart as an OCI artifact on release tags:
  #   helm install llmfit-dra oci://ghcr.io/sympozium-ai/charts/llmfit-dra
  # needs: image so a chart is NEVER published pointing at an image tag that
  # was not built — and it verifies the image manifest exists first.
  chart:
    needs: [test, image]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify the matching image tag exists, then push chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          # docker needs its own login: helm registry login writes helm's
          # auth config, not ~/.docker/config.json, and the package is
          # private — an unauthenticated manifest inspect reports "not
          # found" even when the image exists.
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # The chart's appVersion (== image tag) must be a real manifest.
          if ! docker manifest inspect "ghcr.io/${{ github.repository }}:${version}" >/dev/null 2>&1; then
            echo "::error::image ghcr.io/${{ github.repository }}:${version} not found — refusing to publish chart" >&2
            exit 1
          fi
          helm package charts/llmfit-dra -d /tmp/chart
          helm push /tmp/chart/llmfit-dra-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 only for now: the deploy targets (kind on x86 hosts) are
          # amd64, and the llmfit Rust stage under QEMU makes arm64 builds
          # painfully slow. Revisit with native arm64 runners if needed.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
