name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Unit tests (race detector on)
        run: go test -race ./...

  # Full DRA path on a GPU-less kind cluster: publish → CEL allocation →
  # kubelet plugin prepare (CDI) → pod Running, via the cpu0 fallback device.
  # hack/scenarios.sh skips its GPU-specific assertions when no gpu0 exists.
  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE }}:e2e
          cache-from: type=gha
      - name: Create kind cluster (K8s ≥ 1.34 for DRA GA; 3 nodes)
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.35.0
          cluster_name: e2e
          config: hack/kind-multinode.yaml
      - name: Load image
        run: kind load docker-image ${{ env.IMAGE }}:e2e --name e2e
      - name: Deploy
        run: |
          kubectl apply -f deploy/rbac.yaml -f deploy/admission.yaml -f deploy/deviceclass.yaml -f deploy/daemonset.yaml
          kubectl -n llmfit-dra patch daemonset llmfit-dra --type=json -p='[
            {"op":"replace","path":"/spec/template/spec/containers/0/image","value":"${{ env.IMAGE }}:e2e"},
            {"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"},
            {"op":"remove","path":"/spec/template/spec/imagePullSecrets"}]'
      - name: Scenarios
        run: ./hack/scenarios.sh
      - name: Debug on failure
        if: failure()
        run: |
          kubectl -n llmfit-dra get pods -o wide || true
          kubectl -n llmfit-dra logs daemonset/llmfit-dra --tail=100 || true
          kubectl get resourceslices -o yaml || true
          kubectl describe pod llmfit-consumer llmfit-cpu-consumer 2>/dev/null || true

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 only for now: the deploy targets (kind on x86 hosts) are
          # amd64, and the llmfit Rust stage under QEMU makes arm64 builds
          # painfully slow. Revisit with native arm64 runners if needed.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
