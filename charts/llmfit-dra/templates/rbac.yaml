{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "llmfit-dra.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "llmfit-dra.fullname" . }}
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
rules:
  # Publish and reconcile our inventory. The admission policy (see
  # admission.yaml) narrows these cluster-wide verbs to the writer's own
  # node and the llmfit.ai driver.
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # The helper controller resolves the owning node's UID.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # The kubelet plugin fetches claims NodePrepareResources references; list
  # is for startup GC of orphaned CDI specs.
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list"]
  # ModelClaim controller: reconcile ModelClaims into same-named
  # ResourceClaimTemplates and report status/satisfiability.
  - apiGroups: ["llmfit.ai"]
    resources: ["modelclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["llmfit.ai"]
    resources: ["modelclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaimtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Availability in the Satisfiable condition: watch which devices are held
  # by allocated claims (issue #21).
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "llmfit-dra.fullname" . }}
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "llmfit-dra.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "llmfit-dra.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
