{{- if .Values.controller.enabled }}
# The cluster controller (vs the per-node DaemonSet): reconciles ModelClaims
# (llmfit.ai/v1alpha1) into same-named ResourceClaimTemplates
# (docs/design/modelclaim.md). A plain Deployment — cluster-scoped
# reconciliation with NONE of the DaemonSet's host privileges, and stateless
# by design (all durable state lives in the API server). If it's down,
# existing templates keep stamping per-pod claims; only new/edited
# ModelClaims wait.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmfit-dra.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  # No leader election yet: Recreate prevents the rolling-update window where
  # two controllers race the non-idempotent template delete-then-recreate.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "llmfit-dra.name" . }}-controller
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "llmfit-dra.name" . }}-controller
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: controller
      {{- if .Values.metrics.annotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metricsPort | quote }}
        prometheus.io/path: /metrics
      {{- end }}
    spec:
      # Its own SA: the controller's cluster-wide template/status write powers
      # must not ride along on every node's DaemonSet identity.
      serviceAccountName: {{ include "llmfit-dra.controllerServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ include "llmfit-dra.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --controller
            - --metrics-addr=:{{ .Values.metricsPort }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /readyz, port: metrics }
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
{{- end }}
