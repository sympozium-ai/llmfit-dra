{{- if .Values.deviceClasses.enabled }}
# The base and gpu classes exclude vendorManaged devices: when a vendor DRA
# driver owns this node's GPUs, allocating the same silicon through llmfit
# too would double-book it. A custom class WITHOUT the exclusion deliberately
# re-enables the fitness-companion matchAttribute pattern.
#
# Every class requires healthy: an unhealthy device (driverUnbound, ECC) has
# no usable /dev node to inject — allocating it fails the pod at container
# create, after scheduling. A custom class may opt out.
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: llmfit.ai
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          !('vendorManaged' in device.attributes["llmfit.ai"]) &&
          device.attributes["llmfit.ai"].healthy
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: gpu.llmfit.ai
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          device.attributes["llmfit.ai"].kind == "gpu" &&
          !('vendorManaged' in device.attributes["llmfit.ai"]) &&
          device.attributes["llmfit.ai"].healthy
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: npu.llmfit.ai
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          device.attributes["llmfit.ai"].kind == "npu" &&
          device.attributes["llmfit.ai"].healthy
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: cpu.llmfit.ai
  labels:
    {{- include "llmfit-dra.labels" . | nindent 4 }}
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          device.attributes["llmfit.ai"].kind == "cpu"
{{- end }}
