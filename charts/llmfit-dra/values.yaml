image:
  repository: ghcr.io/sympozium-ai/llmfit-dra
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  # IfNotPresent on a release-pinned tag: the node-critical DaemonSet must be
  # able to restart from the image cache during a registry outage (the rollout
  # design in docs/ARCHITECTURE.md depends on this). Set Always only for
  # mutable dev tags.
  pullPolicy: IfNotPresent

# Names of pre-created dockerconfigjson secrets in the release namespace
# (the GHCR package is currently private — see `make pull-secret`).
imagePullSecrets:
  - ghcr-pull

# Long-lived `llmfit serve` sidecar: the driver consumes capability over
# its versioned REST API on a pod-private Unix socket (no host port — the
# pod is hostNetwork). When disabled, the driver falls back to execing the
# llmfit binary each probe cycle.
llmfitSidecar:
  enabled: true
  socketPath: /run/llmfit/llmfit.sock
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 96Mi

# Prometheus /metrics + /healthz + /readyz (also the node hostPort, since
# the pod is hostNetwork — scrape at nodeIP:metricsPort).
metricsPort: 9099

# Metrics discovery. Annotations cover annotation-based scrapers; the
# PodMonitor covers prometheus-operator/kube-prometheus-stack (a PodMonitor
# fits a hostNetwork DaemonSet better than a Service+ServiceMonitor pair).
metrics:
  # prometheus.io/scrape annotations on both pod templates.
  annotations: true
  podMonitor:
    enabled: false
    # Extra labels for the PodMonitor (e.g. `release: kube-prometheus-stack`
    # so the operator's selector picks it up).
    labels: {}

# Driver flags.
probeInterval: 30s
logVerbosity: 2
# Serve the kubelet DRA plugin (NodePrepareResources → CDI). Disable for a
# publish-only (inventory) deployment.
kubeletPlugin: true
cdiDir: /var/run/cdi
# Taint unhealthy devices NoSchedule — requires the alpha DRADeviceTaints
# feature gate on the cluster.
publishTaints: false
# Vendor DRA drivers whose presence on a node demotes our GPUs to
# fitness-only (empty string disables coexistence demotion).
vendorDrivers: "gpu.nvidia.com,gpu.amd.com,gpu.intel.com,neuron.amazonaws.com"

# Ship the llmfit.ai DeviceClasses (base + per-kind). Disable only if you
# manage classes out-of-band.
deviceClasses:
  enabled: true

# ValidatingAdmissionPolicy pinning this driver's ResourceSlice writes to
# the writing pod's own node (needs bound SA tokens with node claims,
# K8s >= 1.30).
admissionPolicy:
  enabled: true

serviceAccount:
  create: true
  name: ""

priorityClassName: system-node-critical
tolerations:
  - operator: Exists
# Empty = run everywhere (the cpu0 fallback keeps accelerator-less nodes
# useful). For an accelerator-only deployment, pin via a hardware-presence
# label, e.g. NFD's feature.node.kubernetes.io/pci-0300_<vendor>.present
# or the GPU Operator's nvidia.com/gpu.present — see README "Running on a
# subset of nodes".
nodeSelector: {}

# Driver container. Memory request == limit so a node-critical pod under its
# limit is never memory-evicted; CPU is request-only (no throttling on a
# latency-sensitive reconcile loop).
resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    memory: 192Mi

# ModelClaim controller: reconciles ModelClaim objects into same-named
# ResourceClaimTemplates ("run Qwen3.6" as a Kubernetes object — see
# docs/design/modelclaim.md and examples/06-modelclaim.yaml).
modelClaimController:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
