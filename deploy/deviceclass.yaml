# Shipped DeviceClasses — the claim vocabulary for llmfit.ai devices.
#
# A DeviceClass is the mandatory entry point of every DRA request
# (exactly.deviceClassName), and its selectors AND with claim-level
# selectors: the class guarantees "an llmfit device (of this kind)", the
# claim adds the model-specific fit inequality (`llmfit claim` generates
# it from the model database). Deliberately no fit-tier classes — fit is
# claim-time physics, not class vocabulary (Tenet 3). The kind classes
# exist because Kueue and ResourceQuota count requests by class name,
# making device kind a quota/admission dimension for free.
# The base and gpu classes exclude vendorManaged devices: when a vendor DRA
# driver owns this node's GPUs, allocating the same silicon through llmfit
# too would double-book it. The attribute is only ever set (true) on demoted
# devices, so an absence check suffices — and a custom class WITHOUT this
# exclusion deliberately re-enables the fitness-companion matchAttribute
# pattern beside the vendor driver.
# Every accelerator class also requires healthy: an unhealthy device
# (driverUnbound, ECC) has no usable /dev node to inject — allocating it
# fails the pod at container create, after scheduling.
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: llmfit.ai
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          !('vendorManaged' in device.attributes["llmfit.ai"]) &&
          device.attributes["llmfit.ai"].healthy
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: gpu.llmfit.ai
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          device.attributes["llmfit.ai"].kind == "gpu" &&
          !('vendorManaged' in device.attributes["llmfit.ai"]) &&
          device.attributes["llmfit.ai"].healthy
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: npu.llmfit.ai
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          device.attributes["llmfit.ai"].kind == "npu" &&
          device.attributes["llmfit.ai"].healthy
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: cpu.llmfit.ai
spec:
  selectors:
    - cel:
        expression: >-
          device.driver == "llmfit.ai" &&
          device.attributes["llmfit.ai"].kind == "cpu"
