apiVersion: v1
kind: Namespace
metadata:
  name: llmfit-dra
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llmfit-dra
  namespace: llmfit-dra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llmfit-dra
rules:
  # Publish and reconcile our inventory.
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # The helper controller resolves the owning node's UID.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # The kubelet plugin fetches the claims NodePrepareResources references
  # to read their allocation results; list is for startup GC of orphaned
  # CDI specs (files whose claim no longer exists anywhere).
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list"]
  # ModelClaim controller (--controller mode).
  - apiGroups: ["llmfit.ai"]
    resources: ["modelclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["llmfit.ai"]
    resources: ["modelclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaimtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llmfit-dra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llmfit-dra
subjects:
  - kind: ServiceAccount
    name: llmfit-dra
    namespace: llmfit-dra
