apiVersion: v1
kind: Namespace
metadata:
  name: llmfit-dra
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llmfit-dra
  namespace: llmfit-dra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llmfit-dra
rules:
  # Publish and reconcile our inventory.
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # The helper controller resolves the owning node's UID.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # The kubelet plugin fetches the claims NodePrepareResources references
  # to read their allocation results; list is for startup GC of orphaned
  # CDI specs (files whose claim no longer exists anywhere).
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llmfit-dra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llmfit-dra
subjects:
  - kind: ServiceAccount
    name: llmfit-dra
    namespace: llmfit-dra
---
# ModelClaim controller (--controller mode) — its own identity: the
# cluster-wide template/status write powers must not ride along on every
# node's DaemonSet ServiceAccount. Mirrors the chart's split
# (charts/llmfit-dra/templates/rbac.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llmfit-dra-controller
  namespace: llmfit-dra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llmfit-dra-controller
rules:
  - apiGroups: ["llmfit.ai"]
    resources: ["modelclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["llmfit.ai"]
    resources: ["modelclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaimtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Satisfiable condition inputs: published devices, and which are held by
  # allocated claims (issue #21).
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llmfit-dra-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llmfit-dra-controller
subjects:
  - kind: ServiceAccount
    name: llmfit-dra-controller
    namespace: llmfit-dra
