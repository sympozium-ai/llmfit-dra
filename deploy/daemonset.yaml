apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: llmfit-dra
  namespace: llmfit-dra
  labels:
    app.kubernetes.io/name: llmfit-dra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llmfit-dra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llmfit-dra
    spec:
      serviceAccountName: llmfit-dra
      imagePullSecrets:
        - name: ghcr-pull
      # Stage two: full host access. llmfit assesses the node exactly as it
      # would when run natively — real /sys, real /dev, host PID namespace.
      hostPID: true
      # The uevent netlink socket is network-namespace scoped: hostNetwork
      # is what lets the hot-attach listener see host device events.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: llmfit-dra
          image: ghcr.io/sympozium-ai/llmfit-dra:main
          imagePullPolicy: Always
          args:
            - --probe-interval=30s
            - --v=2
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: sysfs
              mountPath: /sys
              readOnly: true
            - name: dev
              mountPath: /dev
            # Kubelet plugin wiring: service socket dir, registration socket
            # dir, and the dynamic CDI spec dir the runtime watches.
            - name: plugins
              mountPath: /var/lib/kubelet/plugins
            - name: plugins-registry
              mountPath: /var/lib/kubelet/plugins_registry
            - name: cdi
              mountPath: /var/run/cdi
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: sysfs
          hostPath:
            path: /sys
        - name: dev
          hostPath:
            path: /dev
        - name: plugins
          hostPath:
            path: /var/lib/kubelet/plugins
            type: Directory
        - name: plugins-registry
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
