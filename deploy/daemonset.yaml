apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: llmfit-dra
  namespace: llmfit-dra
  labels:
    app.kubernetes.io/name: llmfit-dra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llmfit-dra
  # One instance at a time per node (maxSurge is impossible under hostNetwork
  # — two pods can't share the node's ports). The plugin's RollingUpdate
  # option + a pinned image keep the per-node window to a fast restart.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llmfit-dra
    spec:
      serviceAccountName: llmfit-dra
      imagePullSecrets:
        - name: ghcr-pull
      # Must run (and stay running) on every accelerator node: those nodes
      # are routinely tainted, and evicting the driver wedges the claim
      # lifecycle while slices stay published.
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      # The uevent netlink socket is network-namespace scoped: hostNetwork
      # is what lets the hot-attach listener see host device events. That is
      # the ONLY host namespace a code path needs — no hostPID, and
      # NET_ADMIN below instead of privileged.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: llmfit-dra
          # Pin an immutable tag so a node-critical pod can recover from cache
          # (imagePullPolicy IfNotPresent) during a registry outage. The Helm
          # chart tracks the release version automatically; bump this by hand.
          image: ghcr.io/sympozium-ai/llmfit-dra:0.2.1
          imagePullPolicy: IfNotPresent
          args:
            - --probe-interval=30s
            - --v=2
            - --llmfit-url=unix:///run/llmfit/llmfit.sock
            - --metrics-addr=:9099
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          ports:
            - name: metrics
              containerPort: 9099
              hostPort: 9099
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: metrics }
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            capabilities:
              add: ["NET_ADMIN"] # uevent netlink subscribe
          volumeMounts:
            - name: sysfs
              mountPath: /sys
              readOnly: true
            - name: dev
              mountPath: /dev
            # Kubelet plugin wiring: service socket dir, registration socket
            # dir, and the dynamic CDI spec dir the runtime watches.
            - name: plugins
              mountPath: /var/lib/kubelet/plugins
            - name: plugins-registry
              mountPath: /var/lib/kubelet/plugins_registry
            - name: cdi
              mountPath: /var/run/cdi
            - name: llmfit-sock
              mountPath: /run/llmfit
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
        # Capability source: versioned REST API over a pod-private Unix
        # socket (UDS, not TCP: this pod is hostNetwork — a port would bind
        # the NODE's loopback).
        - name: llmfit
          image: ghcr.io/sympozium-ai/llmfit-dra:0.2.1
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/llmfit", "serve", "--unix-socket", "/run/llmfit/llmfit.sock"]
          livenessProbe:
            exec:
              command: ["curl", "-sf", "--unix-socket", "/run/llmfit/llmfit.sock", "http://localhost/health"]
            initialDelaySeconds: 5
            periodSeconds: 30
          volumeMounts:
            - name: llmfit-sock
              mountPath: /run/llmfit
          resources:
            requests:
              cpu: 10m
              memory: 96Mi
            limits:
              memory: 96Mi
      volumes:
        - name: sysfs
          hostPath:
            path: /sys
        - name: dev
          hostPath:
            path: /dev
        - name: plugins
          hostPath:
            path: /var/lib/kubelet/plugins
            type: Directory
        - name: plugins-registry
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: llmfit-sock
          emptyDir: {}
